[tool.pytest.ini_options]
testpaths = ["tests"]
pythonpath = ["."]
addopts = "-p no:homeassistant"
asyncio_mode = "auto"
asyncio_default_fixture_loop_scope = "function"

# Gentle ruff config, mirroring the eveus fork: a long-line allowance plus a
# minimal lint set that catches real errors (syntax, undefined names, unused
# imports) without imposing a wholesale style reformat. Consumed by the local
# pre-commit hook; CI does not gate on ruff.
[tool.ruff]
line-length = 100
target-version = "py312"

[tool.ruff.lint]
select = ["E9", "F401", "F63", "F7", "F82"]
