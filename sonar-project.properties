sonar.organization=abovsh
sonar.projectKey=ABovsh_Keenetic-Router-Pro
sonar.host.url=https://sonarcloud.io

# Free plan analyzes only the main branch; pin every scan to main.
sonar.branch.name=main

sonar.sources=custom_components/keenetic_router_pro
sonar.tests=tests
sonar.python.version=3.12
sonar.python.coverage.reportPaths=coverage.xml

# Rules that are false positives in pytest code:
#   S1244 — float equality assertions
#   S6466 — list/index access in assertions
#   S7503 — async test functions / fixtures with no await
# And one deliberate production exception:
#   S3776 — RCI response parsers are intentionally branch-heavy; a
#           cognitive-complexity refactor here is high-risk and not worth it.
sonar.issue.ignore.multicriteria=e1,e2,e3,e4
sonar.issue.ignore.multicriteria.e1.ruleKey=python:S1244
sonar.issue.ignore.multicriteria.e1.resourceKey=tests/**
sonar.issue.ignore.multicriteria.e2.ruleKey=python:S6466
sonar.issue.ignore.multicriteria.e2.resourceKey=tests/**
sonar.issue.ignore.multicriteria.e3.ruleKey=python:S7503
sonar.issue.ignore.multicriteria.e3.resourceKey=tests/**
sonar.issue.ignore.multicriteria.e4.ruleKey=python:S3776
sonar.issue.ignore.multicriteria.e4.resourceKey=custom_components/keenetic_router_pro/api/**
