sonar.organization=abovsh
sonar.projectKey=ABovsh_Keenetic-Router-Pro
sonar.host.url=https://sonarcloud.io

# Free plan analyzes only the main branch; pin every scan to main.
sonar.branch.name=main

sonar.sources=custom_components/keenetic_router_pro
sonar.tests=tests
sonar.python.version=3.12
sonar.python.coverage.reportPaths=coverage.xml

# Rules that are false positives in pytest code:
#   S1244 — float equality assertions
#   S6466 — list/index access in assertions
#   S7503 — async test functions / fixtures with no await
#   S5778 — `with pytest.raises(...): asyncio.run(coro)` counts as two
#           invocations, but the asyncio.run wrapper is required to drive
#           async entity methods from sync tests; only the awaited coroutine
#           can raise the asserted exception.
# Production exceptions:
#   S7503 — Home Assistant platform/diagnostics entrypoints must be async even
#           when a specific platform currently has no await in its setup body.
#   S3776 — HA entity/coordinator methods are branch-heavy by design because
#           they normalize many optional firmware payload shapes. Runtime
#           security findings are fixed in code instead of suppressed.
sonar.issue.ignore.multicriteria=e1,e2,e3,e4,e5,e6
sonar.issue.ignore.multicriteria.e6.ruleKey=python:S5778
sonar.issue.ignore.multicriteria.e6.resourceKey=tests/**
sonar.issue.ignore.multicriteria.e1.ruleKey=python:S1244
sonar.issue.ignore.multicriteria.e1.resourceKey=tests/**
sonar.issue.ignore.multicriteria.e2.ruleKey=python:S6466
sonar.issue.ignore.multicriteria.e2.resourceKey=tests/**
sonar.issue.ignore.multicriteria.e3.ruleKey=python:S7503
sonar.issue.ignore.multicriteria.e3.resourceKey=tests/**
sonar.issue.ignore.multicriteria.e4.ruleKey=python:S3776
sonar.issue.ignore.multicriteria.e4.resourceKey=custom_components/keenetic_router_pro/**
sonar.issue.ignore.multicriteria.e5.ruleKey=python:S7503
sonar.issue.ignore.multicriteria.e5.resourceKey=custom_components/keenetic_router_pro/**
