name: CI

on:
  push:
  pull_request:
  workflow_dispatch:

permissions:
  contents: read

concurrency:
  group: ci-${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  test:
    runs-on: ubuntu-latest
    name: Python tests
    steps:
      - name: Check out repository
        uses: actions/checkout@v6

      - name: Set up Python
        uses: actions/setup-python@v6
        with:
          python-version: "3.12"
          cache: pip
          cache-dependency-path: requirements-dev.txt

      - name: Upgrade pip
        run: python -m pip install --upgrade pip

      - name: Install test dependencies
        run: python -m pip install -r requirements-dev.txt

      - name: Compile sources
        env:
          PYTHONPYCACHEPREFIX: /tmp/keenetic-pycache
        run: python -m compileall -q custom_components tests

      - name: Run tests with coverage baseline
        run: >-
          python -m coverage run
          --source=custom_components/keenetic_router_pro
          -m pytest -q tests

      - name: Report coverage
        run: python -m coverage report --show-missing --fail-under=40

      - name: Generate coverage XML
        if: github.event_name == 'push'
        run: python -m coverage xml

      - name: Upload coverage report
        if: github.event_name == 'push'
        uses: actions/upload-artifact@v4
        with:
          name: coverage-xml
          path: coverage.xml
          retention-days: 1

  sonar:
    name: SonarCloud
    needs: test
    if: github.event_name == 'push'
    runs-on: ubuntu-latest
    steps:
      - name: Check out repository
        uses: actions/checkout@v6
        with:
          # Full history so SonarCloud can attribute new code and blame lines.
          fetch-depth: 0

      - name: Download coverage report
        uses: actions/download-artifact@v4
        with:
          name: coverage-xml

      - name: SonarCloud scan
        uses: SonarSource/sonarqube-scan-action@v4
        env:
          SONAR_TOKEN: ${{ secrets.SONAR_TOKEN }}
          SONAR_HOST_URL: "https://sonarcloud.io"
